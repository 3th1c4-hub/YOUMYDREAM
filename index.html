<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deep Space Archive : Private Terminal</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

<style id="dynamic-font"></style>
<style>
    :root {
        --bg-deep: #050608; --bg-panel: rgba(15, 17, 21, 0.9); 
        --moon-light: #e2e8f0; --moon-dim: #8492a6; 
        --accent-rgb: 200, 180, 142; 
        --voyager-gold: rgb(var(--accent-rgb)); 
        --voyager-glow: 0 0 15px rgba(var(--accent-rgb), 0.3);
        --border-line: 1px solid rgba(132, 146, 166, 0.2);
        --border-gold: 1px solid rgba(var(--accent-rgb), 0.3);
        --eng-font-family: 'ArtemisLocal', 'Playfair Display', 'Pretendard', serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Pretendard', sans-serif; background: var(--bg-deep); color: var(--moon-light); overflow: hidden; background-image: radial-gradient(circle at 50% 50%, #121418 0%, #050608 100%); height: 100vh; display: flex; }
    
    .eng-font { font-family: var(--eng-font-family) !important; }
    .term-font { font-family: 'Share Tech Mono', 'Pretendard', monospace; }

    #intro-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#020203; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:9999; cursor:pointer; transition:opacity 1.5s; }
    .intro-text { font-size:1.4rem; color:var(--voyager-gold); text-align:center; line-height:2; text-shadow:var(--voyager-glow); opacity:0; animation:fadeInOut 3s infinite alternate; white-space:pre-wrap; }
    @keyframes fadeInOut { 0%{opacity:0.3;} 100%{opacity:1;} }

    #app { display:none; width:100%; height:100%; flex-direction:row; }
    .sidebar { width:300px; background:var(--bg-panel); border-right:var(--border-line); padding:40px 25px; display:flex; flex-direction:column; backdrop-filter:blur(15px); overflow-y:auto; z-index:10;}
    .logo { font-size:2rem; color:var(--voyager-gold); text-align:center; cursor:pointer; margin-bottom:30px; text-shadow:var(--voyager-glow); line-height:1.2; }
    
    .nav-item-wrapper { margin-bottom:2px; }
    .nav-item { padding:8px 15px; cursor:pointer; color:var(--moon-light); font-size:0.95rem; border-radius:4px; display:flex; align-items:center; transition:0.2s;}
    .nav-item:hover { background:rgba(var(--accent-rgb), 0.1); color:var(--voyager-gold); }
    .nav-item.active { color:var(--voyager-gold); font-weight:600; background:rgba(var(--accent-rgb), 0.15); border-left:2px solid var(--voyager-gold); }
    .nav-toggle { margin-right:8px; font-size:0.7rem; color:var(--moon-dim); transition:transform 0.2s; width:12px; text-align:center; }
    .nav-toggle.open { transform:rotate(90deg); color:var(--voyager-gold); }

    .widget-box { background:rgba(0,0,0,0.3); border:var(--border-line); border-radius:4px; padding:15px; text-align:center; margin-bottom:25px; }
    .bgm-widget { background:rgba(0,0,0,0.3); border:var(--border-line); border-radius:4px; padding:10px; margin-bottom:25px; text-align:center; display:none; }
    .bgm-title { font-size:0.75rem; color:var(--moon-dim); margin-bottom:8px; letter-spacing:1px; }

    .content-area { flex:1; padding:60px 70px; overflow-y:auto; position: relative; }
    .page { display:none; max-width:950px; margin:0 auto; animation:fadeUp 0.5s; }
    .page.active { display:block; }
    @keyframes fadeUp { from{opacity:0; transform:translateY(20px);} to{opacity:1;} }

    .home-container { display:flex; flex-direction:column; align-items:center; }
    .home-hero-img { width: 100%; max-width: 900px; height: 380px; object-fit: cover; border-radius: 4px; border: 1px solid rgba(var(--accent-rgb), 0.3); box-shadow: 0 5px 25px rgba(0,0,0,0.5), 0 0 15px rgba(var(--accent-rgb), 0.2); margin-bottom: 40px; display: none; }
    .home-top { display:flex; justify-content:center; width: 100%; max-width: 900px;}
    .home-banner { border: 1px solid rgba(var(--accent-rgb), 0.5); background: rgba(5,6,8,0.9); padding: 40px; text-align: left; border-radius: 4px; width: 100%; max-width: 500px; box-shadow: 0 0 20px rgba(var(--accent-rgb), 0.15); display: flex; flex-direction: column; position: relative; flex-shrink: 0; overflow: visible; }
    .home-banner::before { content: ''; position: absolute; top: -2px; left: -2px; width: 20px; height: 20px; border-top: 3px solid var(--voyager-gold); border-left: 3px solid var(--voyager-gold); }
    .home-banner::after { content: ''; position: absolute; bottom: -2px; right: -2px; width: 20px; height: 20px; border-bottom: 3px solid var(--voyager-gold); border-right: 3px solid var(--voyager-gold); }

    #home-maintitle { font-size: 2.2rem; color: #fff; margin-bottom: 10px; font-style: normal; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; z-index: 2; }
    .home-subtitle-wrap { border-bottom: 1px solid rgba(var(--accent-rgb), 0.3); padding-bottom: 15px; margin-bottom: 25px; z-index: 2; }
    .home-tech-subtitle { font-family: 'Share Tech Mono', monospace; font-size: 0.8rem; color: var(--voyager-gold); letter-spacing: 3px; text-transform: uppercase; }
    #home-desc-display { font-size: 0.95rem; color: var(--moon-light); line-height: 1.8; white-space: pre-wrap; z-index: 2; padding-left: 15px; border-left: 3px solid rgba(var(--accent-rgb), 0.6); }
    .home-banner-footer { margin-top: 30px; font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; color: var(--moon-dim); display: flex; justify-content: space-between; border-top: 1px solid rgba(132, 146, 166, 0.2); padding-top: 10px; }

    .home-shortcuts-wrap { margin-top: 60px; width: 100%; border-top: 1px solid rgba(132,146,166,0.2); padding-top: 40px; display:none; }
    .home-shortcuts-title { font-size: 1.1rem; color: var(--voyager-gold); margin-bottom: 25px; text-align: center; font-weight: 600; letter-spacing: 2px; }
    .home-shortcuts { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
    .shortcut-card { width: 180px; height: 260px; border-radius: 8px; overflow: hidden; position: relative; cursor: grab; border: 1px solid rgba(255,255,255,0.1); transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s; background: rgba(0,0,0,0.6); }
    .shortcut-card:active { cursor: grabbing; }
    .shortcut-card:hover { transform: translateY(-5px); border-color: var(--voyager-gold); box-shadow: var(--voyager-glow); }
    .shortcut-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; transition: 0.5s; pointer-events: none;}
    .shortcut-card:hover .shortcut-img { opacity: 1; transform: scale(1.05); }
    .shortcut-info { position: absolute; bottom: 0; left: 0; width: 100%; padding: 25px 15px 15px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); pointer-events: none; }
    .shortcut-title { color: #fff; font-size: 1.05rem; font-weight: 600; margin-bottom: 5px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .shortcut-cat { color: var(--voyager-gold); font-size: 0.75rem; font-weight: 500; letter-spacing: 1px; }

    #post-list-container.view-list { display: flex; flex-direction: column; gap: 15px; }
    #post-list-container.view-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }

    .post-card { background:rgba(15,17,21,0.6); border:var(--border-line); border-radius:6px; cursor:pointer; transition:0.3s; position:relative; overflow:hidden; }
    .post-card:hover { border-color:var(--voyager-gold); transform:translateY(-2px); box-shadow:0 5px 15px rgba(0,0,0,0.5); background:rgba(20,22,28,0.8); }
    .post-card.notice { border-color:var(--voyager-gold); background:rgba(var(--accent-rgb),0.05); }
    .notice-badge { font-size:0.75rem; color:var(--bg-deep); background:var(--voyager-gold); padding:2px 6px; border-radius:2px; font-weight:600; display:inline-block; margin-bottom:6px; width:max-content; align-self:flex-start; }
    .post-thumb { object-fit:cover; border:1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.4); }

    .view-list .post-card { padding:20px 25px; display:flex; align-items:center; gap:20px; }
    .view-list .post-thumb { width:80px; height:80px; border-radius:4px; flex-shrink:0; }
    .view-list .post-info-wrap { flex: 1; text-align: left; display:flex; flex-direction:column; justify-content:center; }
    
    .view-gallery .post-card { display:flex; flex-direction:column; padding:0; text-align:center; }
    .view-gallery .post-thumb { width:100%; height:160px; border-radius:6px 6px 0 0; border:none; border-bottom:1px solid rgba(255,255,255,0.05); }
    .view-gallery .post-info-wrap { padding:15px; flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; }

    .editor-toolbar { display:flex; gap:6px; background:rgba(0,0,0,0.5); padding:10px; border:var(--border-line); border-bottom:none; border-radius:4px 4px 0 0; flex-wrap:wrap; align-items:center; }
    .editor-toolbar button { background:transparent; border:1px solid rgba(255,255,255,0.1); color:var(--moon-light); padding:6px 12px; cursor:pointer; border-radius:2px; font-size:0.85rem; transition:0.2s; font-family:'Pretendard', sans-serif;}
    .editor-toolbar button:hover { background:rgba(var(--accent-rgb),0.2); color:var(--voyager-gold); border-color:var(--voyager-gold); }
    .editor-toolbar .divider { color:var(--moon-dim); margin:0 4px; font-size:0.9rem; }
    .color-picker-wrap { display:flex; align-items:center; gap:6px; font-size:0.8rem; color:var(--moon-light); background:rgba(255,255,255,0.05); padding:4px 8px; border-radius:2px; border:1px solid rgba(255,255,255,0.1); }
    .color-picker-wrap input[type="color"] { width:20px; height:20px; border:none; cursor:pointer; background:transparent; padding:0; }
    .editor-select { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:var(--moon-light); padding:5px 8px; border-radius:2px; font-size:0.85rem; outline:none; cursor:pointer; font-family:'Pretendard', sans-serif; }
    .editor-select option { background: #121418; color: #fff; }

    #w-content { border-radius:0 0 4px 4px; min-height:400px; height:auto; padding:20px; background:rgba(0,0,0,0.3); border:var(--border-line); color:#fff; outline:none; transition:0.2s; overflow-y:auto; line-height:1.8; font-size:1.05rem; }
    #w-content:focus { border-color:var(--voyager-gold); background:rgba(0,0,0,0.5); }
    #w-content:empty:before { content:attr(placeholder); color:var(--moon-dim); }

    .rich-table { border-collapse:collapse; margin:15px 0; max-width:100%; transition: 0.2s; }
    .rich-table th, .rich-table td { border:1px solid rgba(132,146,166,0.3); padding:10px; }
    .youtube-embed-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; max-width: 100%; border-radius: 8px; margin: 20px 0; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    .youtube-embed-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
    #w-content a, #v-content a { color: var(--voyager-gold); text-decoration: underline; text-underline-offset: 4px; }
    #w-content a:hover, #v-content a:hover { color: #fff; }
    .rich-details { margin: 20px 0; background: rgba(0, 0, 0, 0.4); border: var(--border-line); border-left: 3px solid var(--voyager-gold); border-radius: 4px; padding: 15px; transition: 0.3s; }
    .rich-details > summary { cursor: pointer; color: var(--voyager-gold); font-weight: 600; font-size: 1.05rem; outline: none; list-style: none; display: flex; align-items: center; }
    .rich-details > summary::before { content: '▶'; display: inline-block; margin-right: 10px; font-size: 0.8rem; transition: 0.2s; }
    .rich-details[open] > summary::before { transform: rotate(90deg); }
    .rich-details > .details-content { margin-top: 15px; color: var(--moon-light); line-height: 1.8; border-top: 1px dashed rgba(255,255,255,0.1); padding-top: 15px; }

    .input-control { width:100%; padding:12px; background:rgba(0,0,0,0.4); border:var(--border-line); color:#fff; border-radius:4px; margin-bottom:15px; outline:none; transition:0.2s;}
    .input-control:focus { border-color:var(--voyager-gold); background:rgba(0,0,0,0.6);}
    .btn { padding:10px 20px; border:1px solid var(--voyager-gold); color:var(--voyager-gold); background:none; cursor:pointer; border-radius:4px; font-weight:500; transition:0.2s; }
    .btn:hover { background:var(--voyager-gold); color:#000; box-shadow:var(--voyager-glow); }
    .btn-solid { background:var(--voyager-gold); color:#000; }

    .modal-bg { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:none; justify-content:center; align-items:center; z-index:10000; backdrop-filter:blur(5px); }
    .modal { background:var(--bg-panel); padding:40px; border-radius:8px; width:650px; border:var(--border-gold); box-shadow:var(--voyager-glow); max-height:90vh; display:flex; flex-direction:column;}
    
    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--moon-dim); border-radius:3px; }
    ::-webkit-scrollbar-thumb:hover { background:var(--voyager-gold); }
</style>
</head>
<body>

<div id="intro-screen" onclick="enterSite()">
    <div class="intro-text eng-font" id="intro-text-display"></div>
    <div class="intro-hint" style="font-family:'Pretendard'">[ ACCESS TERMINAL ]</div>
</div>

<div id="app">
    <div class="sidebar">
        <div class="logo eng-font" id="sidebar-logo" onclick="goPage('home')">Voyager<br>Archive</div>
        <div class="bgm-widget" id="bgm-widget">
            <div class="bgm-title eng-font">AUDIO LINK</div>
            <iframe id="bgm-iframe" width="100%" height="40" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
        <div class="eng-font" style="font-size:0.75rem; color:var(--moon-dim); margin-bottom:15px; letter-spacing:1px; padding-left:15px;">CATEGORIES</div>
        <div id="category-list"></div>
        <div style="margin-top:auto; padding-top:20px; border-top:1px dashed var(--moon-dim);">
            <div id="auth-status" style="font-size:0.75rem; text-align:center; margin-bottom:10px;">🔒 읽기 전용 통신</div>
            <button class="btn btn-solid" style="width:100%; margin-bottom:10px;" id="btn-admin-write" onclick="handleAuthAction('write')">+ 새 데이터 전송</button>
            <button class="btn" style="width:100%; margin-bottom:10px; display:none; border-color:var(--moon-light); color:var(--moon-light);" id="btn-guest-write" onclick="goGuestWrite()">✒️ 방명록 남기기</button>
            <button class="btn" style="width:100%; font-size:0.85rem;" onclick="handleAuthAction('setting')">⚙️ 시스템 통합 설정</button>
        </div>
    </div>

    <div class="content-area">
        <div id="page-home" class="page active">
            <div class="home-container">
                <img id="home-banner-img" class="home-hero-img" src="">
                <div class="home-top">
                    <div class="home-banner">
                        <div style="margin-bottom:15px; font-size: 0.7rem; color: var(--moon-dim); text-transform:uppercase; letter-spacing: 1.5px; font-weight:700; display:flex; align-items:center; gap:8px;">
                            <span style="width:8px; height:8px; background:var(--voyager-gold); border-radius:2px; box-shadow: 0 0 5px var(--voyager-gold);"></span>
                            System Status :: Active
                        </div>
                        <h1 class="eng-font" id="home-maintitle">Voyager Record</h1>
                        <div class="home-subtitle-wrap">
                            <div class="home-tech-subtitle eng-font">Deep Space Archive</div>
                        </div>
                        <p id="home-desc-display"></p>
                        <div class="home-banner-footer">
                            <span>STDRD_DAT_V8.0</span>
                            <span>ENC_MODE_AES256</span>
                        </div>
                    </div>
                </div>
                <div id="home-shortcuts-wrap" class="home-shortcuts-wrap">
                    <div class="home-shortcuts-title eng-font">MAIN TRACKS <span style="font-size:0.7rem; color:var(--moon-dim); font-family:'Pretendard'; font-weight:normal;">(Drag to Reorder)</span></div>
                    <div id="home-shortcuts" class="home-shortcuts"></div>
                </div>
            </div>
        </div>

        <div id="page-board" class="page">
            <div style="display:flex; justify-content:space-between; align-items:flex-end; border-bottom:var(--border-line); padding-bottom:20px; margin-bottom:30px;">
                <h2 id="board-title" class="eng-font" style="font-size:2rem; color:var(--voyager-gold); font-weight:400; margin:0; text-align:left;">Category</h2>
                <div class="view-toggles">
                    <button class="view-btn active" id="btn-view-list" onclick="setViewMode('list')">☰ 리스트</button>
                    <button class="view-btn" id="btn-view-gallery" onclick="setViewMode('gallery')">⊞ 갤러리</button>
                </div>
            </div>
            <div id="post-list-container" class="view-list"></div>
        </div>

        <div id="page-write" class="page">
            <h2 id="write-page-title" class="eng-font" style="margin-bottom:30px; color:var(--voyager-gold); font-size:2rem;">Transmission Log</h2>
            <div style="display:flex; gap:10px;">
                <select id="w-category" class="input-control" style="flex:1;"></select>
                <input type="text" id="w-author" class="input-control" style="flex:1;" placeholder="작성자 닉네임 (선택)">
            </div>
            <input type="text" id="w-title" class="input-control" placeholder="제목을 입력하세요">
            <input type="text" id="w-img-url" class="input-control" placeholder="썸네일/포스터 이미지 URL (https://...) 입력">
            <div style="margin-bottom:20px;">
                <div class="editor-toolbar">
                    <button onclick="formatDoc('bold')" style="font-weight:bold;">B</button>
                    <button onclick="formatDoc('italic')" style="font-style:italic;">I</button>
                    <span class="divider">|</span>
                    <select class="editor-select" onchange="formatDoc('fontSize', this.value); this.selectedIndex=0;">
                        <option value="">크기</option>
                        <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option>
                    </select>
                    <span class="divider">|</span>
                    <button onclick="formatDoc('justifyLeft')">⫷</button><button onclick="formatDoc('justifyCenter')">≡</button><button onclick="formatDoc('justifyRight')">⫸</button>
                    <span class="divider">|</span>
                    <div class="color-picker-wrap">글자 <input type="color" onchange="formatDoc('foreColor', this.value)"></div>
                    <div class="color-picker-wrap">배경 <input type="color" onchange="formatDoc('hiliteColor', this.value)"></div>
                    <span class="divider">|</span>
                    <button onclick="openTableModal()">▦ 표</button><button onclick="insertLink()">🔗 링크</button><button onclick="insertToggle()">▼ 접은글</button><button onclick="insertYouTube()" style="color:#ff5c5c;">▶</button>
                </div>
                <div id="w-content" contenteditable="true" placeholder="기록 내용을 자유롭게 작성하세요."></div>
            </div>
            <div style="display:flex; gap:10px;"><button class="btn btn-solid" onclick="savePost()">디스크에 기록</button><button class="btn" onclick="goPage('board')">작성 취소</button></div>
        </div>

        <div id="page-view" class="page">
            <div style="display:flex; justify-content:space-between; margin-bottom:30px;">
                <button class="btn" onclick="goPage('board')">← 목록으로</button>
                <div id="admin-actions" style="display:none;">
                    <button class="btn" id="btn-notice" style="margin-right:5px;" onclick="toggleNotice()">★ 메인 트랙</button>
                    <button class="btn" style="margin-right:5px;" onclick="handleAuthAction('edit')">수정</button>
                    <button class="btn" style="border-color:#d9534f; color:#d9534f;" onclick="handleAuthAction('delete')">삭제</button>
                </div>
            </div>
            <div style="text-align:left; border-bottom:1px dashed var(--moon-dim); padding-bottom:25px; margin-bottom:40px;">
                <h2 id="v-title" style="font-size:2.2rem; margin-bottom:15px; color:#fff;"></h2>
                <div id="v-info" class="eng-font" style="color:var(--moon-dim); font-size:0.95rem;"></div>
            </div>
            <img id="v-image" style="max-width:100%; border-radius:6px; margin:0 auto 40px auto; display:block; border:var(--border-line);">
            <div id="v-content" style="line-height:2; font-size:1.1rem; color:var(--moon-light);"></div>
        </div>
    </div>
</div>

<div id="authModal" class="modal-bg">
    <div class="modal" style="width:400px; padding:30px;">
        <h3 class="eng-font" style="color:var(--voyager-gold); margin-bottom:15px;">AUTHENTICATION</h3>
        <input type="password" id="auth-password" class="input-control" placeholder="Master Key...">
        <div style="display:flex; gap:10px; justify-content:flex-end;"><button class="btn btn-solid" onclick="processAuth()">승인</button><button class="btn" onclick="closeModal('authModal')">취소</button></div>
    </div>
</div>

<div id="tableModal" class="modal-bg">
    <div class="modal" style="width:350px; padding:25px;">
        <h3 class="eng-font" style="color:var(--voyager-gold); margin-bottom:20px;">TABLE SETTINGS</h3>
        <div id="t-rows-wrap" style="margin-bottom:15px; display:flex; justify-content:space-between;"><label>행(Row)</label><input type="number" id="t-rows" class="input-control" style="width:100px;" value="3"></div>
        <div id="t-cols-wrap" style="margin-bottom:15px; display:flex; justify-content:space-between;"><label>열(Column)</label><input type="number" id="t-cols" class="input-control" style="width:100px;" value="3"></div>
        <div style="margin-bottom:15px; display:flex; justify-content:space-between;"><label>너비(%)</label><input type="number" id="t-width" class="input-control" style="width:100px;" value="100"></div>
        <div style="margin-bottom:25px; display:flex; justify-content:space-between;"><label>배경색</label><div style="display:flex; align-items:center; gap:10px;"><input type="color" id="t-bg" value="#000000"><input type="checkbox" id="t-bg-transparent" checked>투명</div></div>
        <div style="display:flex; gap:10px; justify-content:flex-end;"><button class="btn btn-solid" onclick="applyTable()">적용</button><button class="btn" onclick="closeModal('tableModal')">취소</button></div>
    </div>
</div>

<div id="settingModal" class="modal-bg">
    <div class="modal">
        <h3 class="eng-font" style="color:var(--voyager-gold); margin-bottom:20px; border-bottom:1px solid rgba(var(--accent-rgb),0.2); padding-bottom:15px;">SYSTEM INTEGRATION</h3>
        <div style="overflow-y:auto; padding-right:15px; flex:1;">
            <label>★ 대문 배너 이미지</label><input type="text" id="s-home-banner-img" class="input-control">
            <label>★ Artemis 웹 폰트 링크</label><input type="text" id="s-font-url" class="input-control">
            <label>1. 테마 컬러 관리</label>
            <div style="display:flex; gap:10px; margin-bottom:10px;"><select id="s-theme-select" class="input-control" style="flex:1;"></select><button class="btn" onclick="editThemeName()">수정</button><button class="btn" style="color:#d9534f;" onclick="deleteTheme()">삭제</button></div>
            <div style="display:flex; gap:10px; align-items:center; background:rgba(0,0,0,0.3); padding:10px; border-radius:4px;"><input type="color" id="s-new-theme-color"><input type="text" id="s-new-theme-name" class="input-control" style="flex:1; margin-bottom:0;"><button class="btn btn-solid" onclick="addTheme()">추가</button></div>
            <label>2. 사이드바 BGM ID</label><input type="text" id="s-bgm-id" class="input-control">
            <label>3. 보안 및 사이트 정보</label><input type="password" id="s-new-pw" class="input-control" placeholder="새 비밀번호"><input type="text" id="s-intro-main" class="input-control eng-font" placeholder="인트로"><input type="text" id="s-site-name" class="input-control eng-font" placeholder="로고"><input type="text" id="s-home-title" class="input-control eng-font" placeholder="대문제목"><textarea id="s-home-desc" class="input-control" style="height:60px;"></textarea>
            <label>4. 방명록 카테고리 지정</label><select id="s-guestbook-cat" class="input-control"></select>
            <label>5. 카테고리 관리</label>
            <div style="display:flex; gap:10px; margin-bottom:10px;"><select id="s-parent-cat" class="input-control" style="flex:1;"></select><input type="text" id="s-new-cat" class="input-control" style="flex:2; margin-bottom:0;" placeholder="새 이름"><button class="btn btn-solid" onclick="addCategory()">추가</button></div>
            <div id="cat-manage-list" style="background:rgba(0,0,0,0.3); border:var(--border-line); border-radius:4px; padding:15px;"></div>
        </div>
        <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:20px;"><button class="btn btn-solid" onclick="saveSettings()">설정 저장</button><button class="btn" onclick="closeModal('settingModal')">닫기</button></div>
    </div>
</div>

<script>
    /* 🔥 파이어베이스 설정값을 이곳에 입력하세요 🔥 */
    const firebaseConfig = {
      apiKey: "AIzaSyCaZhFOWBh_VfHvSc7Ixt-UuGkUzkAioVo",
      authDomain: "youmydream-b8fc1.firebaseapp.com",
      databaseURL: "https://youmydream-b8fc1-default-rtdb.asia-southeast1.firebasedatabase.app/",
      projectId: "youmydream-b8fc1",
      storageBucket: "youmydream-b8fc1.firebasestorage.app",
      messagingSenderId: "973019977954",
      appId: "1:973019977954:web:59ea82713fcee44adce6bb"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const $ = id => document.getElementById(id);
    function hexToRgb(hex) { let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16); return `${r}, ${g}, ${b}`; }

    const defaultDb = {
        masterPw: "1234", viewMode: "list", bgmId: "", activeThemeId: 1,
        homeBannerImg: "", fontUrl: "", themes: [{ id: 1, name: "Voyager Gold", hex: "#c8b48e" }],
        siteName: "Voyager\nArchive", homeTitle: "Voyager Record", homeDesc: "Archive of the stars.",
        introMain: "\" To the makers of music – all worlds, all times. \"",
        guestbookCatId: null, noticeOrder: [], categories: [{id:1, name:"Main Track", parentId:null}], posts: []
    };

    let db = JSON.parse(JSON.stringify(defaultDb));
    let isAuthed = false, currentCatId = null, currentPostId = null, editingPostId = null, expandedCats = new Set(), authCallback = null, isFirstLoad = false;

    function init() {
        database.ref('voyagerArchive').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                db = { ...defaultDb, ...data };
                // 파이어베이스에서 객체로 변환되어 올 수 있는 데이터들을 배열로 강제 변환
                if(data.categories) db.categories = Object.values(data.categories);
                if(data.posts) db.posts = Object.values(data.posts);
                if(data.themes) db.themes = Object.values(data.themes);
                if(data.noticeOrder) db.noticeOrder = Object.values(data.noticeOrder);
            } else { saveDB(); }

            if (!isFirstLoad) {
                db.categories.filter(c => c.parentId == null).forEach(c => expandedCats.add(c.id));
                isFirstLoad = true;
            }
            applyUI(); 
            renderNav();
            if($('settingModal').style.display === 'flex') updateCatMgmt(); // 설정창 열려있을 때 목록 갱신
        });
    }

    function saveDB() { database.ref('voyagerArchive').set(db); }

    function applyUI() {
        let currentTheme = db.themes.find(t => t.id === db.activeThemeId) || db.themes[0];
        document.documentElement.style.setProperty('--accent-rgb', hexToRgb(currentTheme.hex));
        const fontStyle = $('dynamic-font');
        if(db.fontUrl && db.fontUrl.trim() !== "") {
            fontStyle.innerHTML = `@font-face { font-family: 'ArtemisWeb'; src: url('${db.fontUrl.trim()}'); font-display: swap; }`;
            document.documentElement.style.setProperty('--eng-font-family', "'ArtemisWeb', 'Pretendard', serif");
        } else {
            fontStyle.innerHTML = `@font-face { font-family: 'ArtemisLocal'; src: local('Artemis'); font-display: swap; }`;
            document.documentElement.style.setProperty('--eng-font-family', "'ArtemisLocal', 'Playfair Display', 'Pretendard', serif");
        }
        $('intro-text-display').innerHTML = `${db.introMain}<br><br><span style="font-family:'Pretendard'; font-size:1rem; opacity:0.6;">[ CONNECTING DEEP SPACE ]</span>`;
        $('sidebar-logo').innerHTML = (db.siteName||"").replace(/\n/g, '<br>');
        $('home-maintitle').innerText = db.homeTitle; $('home-desc-display').innerText = db.homeDesc;
        const bannerImg = $('home-banner-img'); if(db.homeBannerImg) { bannerImg.src = db.homeBannerImg; bannerImg.style.display = 'block'; } else { bannerImg.style.display = 'none'; }
        const bgmWidget = $('bgm-widget'), bgmIframe = $('bgm-iframe');
        if (db.bgmId) { const src = `https://www.youtube.com/embed/${db.bgmId.trim()}?autoplay=1&loop=1&playlist=${db.bgmId.trim()}`; if(bgmIframe.src !== src) bgmIframe.src = src; bgmWidget.style.display = 'block'; } 
        else { bgmWidget.style.display = 'none'; bgmIframe.src = ""; }
        if(isAuthed) { $('auth-status').innerText = "🔓 AUTHENTICATED"; $('auth-status').style.color = "var(--voyager-gold)"; $('admin-actions').style.display = 'flex'; $('btn-guest-write').style.display = 'none'; } 
        else { $('auth-status').innerText = "🔒 READ ONLY"; $('auth-status').style.color = "var(--moon-dim)"; $('admin-actions').style.display = 'none'; if(db.guestbookCatId) $('btn-guest-write').style.display = 'block'; else $('btn-guest-write').style.display = 'none'; }
        setViewMode(db.viewMode, false); renderHomeShortcuts(); 
    }

    let draggedNoticeId = null;
    window.onDragStart = function(e, id) { draggedNoticeId = id; e.dataTransfer.effectAllowed = 'move'; setTimeout(() => e.target.style.opacity = '0.5', 0); }
    window.onDragEnd = function(e) { e.target.style.opacity = '1'; draggedNoticeId = null; }
    window.onDragOver = function(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
    window.onDrop = function(e, targetId) {
        e.preventDefault(); if(!draggedNoticeId || draggedNoticeId === targetId) return;
        const fromIdx = db.noticeOrder.indexOf(draggedNoticeId), toIdx = db.noticeOrder.indexOf(targetId);
        if(fromIdx > -1 && toIdx > -1) { db.noticeOrder.splice(fromIdx, 1); db.noticeOrder.splice(toIdx, 0, draggedNoticeId); saveDB(); }
    }

    function renderHomeShortcuts() {
        const wrap = $('home-shortcuts-wrap'), container = $('home-shortcuts');
        let notices = db.posts.filter(p => p.isNotice);
        let noticeIds = notices.map(p => p.id);
        if(!db.noticeOrder) db.noticeOrder = [];
        db.noticeOrder = db.noticeOrder.filter(id => noticeIds.includes(id));
        noticeIds.forEach(id => { if(!db.noticeOrder.includes(id)) db.noticeOrder.push(id); });
        notices.sort((a,b) => db.noticeOrder.indexOf(a.id) - db.noticeOrder.indexOf(b.id));
        if(notices.length === 0) { wrap.style.display = 'none'; return; }
        wrap.style.display = 'block';
        container.innerHTML = notices.map(p => {
            const cat = db.categories.find(c => c.id === p.catId);
            const img = p.imgUrl ? `<img src="${p.imgUrl}" class="shortcut-img">` : `<div class="shortcut-img">NO IMG</div>`;
            return `<div class="shortcut-card" draggable="true" ondragstart="onDragStart(event, ${p.id})" ondragend="onDragEnd(event)" ondragover="onDragOver(event)" ondrop="onDrop(event, ${p.id})" onclick="viewPost(${p.id})">${img}<div class="shortcut-info"><div class="shortcut-cat eng-font">${cat?cat.name:''}</div><div class="shortcut-title">${p.title}</div></div></div>`;
        }).join('');
    }

    window.checkAuth = function(cb) { if(isAuthed) cb(); else { $('auth-password').value = ''; openModal('authModal'); authCallback = cb; } }
    window.processAuth = function() { if($('auth-password').value === db.masterPw) { isAuthed = true; closeModal('authModal'); applyUI(); if(authCallback) authCallback(); } else alert('불일치'); }
    window.handleAuthAction = function(action) { checkAuth(() => { if(action === 'write') goWrite(); else if(action === 'edit') goWrite(currentPostId); else if(action === 'delete') deletePost(); else if(action === 'setting') openSettingModal(); }); }
    window.enterSite = function() { $('intro-screen').style.opacity = '0'; setTimeout(() => { $('intro-screen').style.display = 'none'; $('app').style.display = 'flex'; goPage('home'); }, 1000); }
    window.goPage = function(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); $('page-' + id).classList.add('active'); renderNav(); if(id === 'home') renderHomeShortcuts(); }
    window.openModal = function(id) { $(id).style.display = 'flex'; }
    window.closeModal = function(id) { $(id).style.display = 'none'; }
    window.toggleCat = function(e, id) { e.stopPropagation(); expandedCats.has(id) ? expandedCats.delete(id) : expandedCats.add(id); renderNav(); }

    function buildNav(parentId = null, level = 0) {
        let html = '';
        // 🔥 중요: 파이어베이스에서 null이 사라지는 문제 해결을 위해 == null 사용 (null과 undefined 둘 다 체크)
        db.categories.filter(c => c.parentId == parentId).forEach(c => {
            const hasChild = db.categories.some(s => s.parentId == c.id);
            const isExp = expandedCats.has(c.id);
            const isAct = c.id === currentCatId && $('page-board').classList.contains('active');
            html += `<div class="nav-item-wrapper" style="padding-left:${level*15}px;"><div class="nav-item ${isAct?'active':''}" onclick="openCategory(${c.id})">${hasChild ? `<div class="nav-toggle ${isExp?'open':''}" onclick="toggleCat(event, ${c.id})">▶</div>` : `<div style="width:20px;"></div>`}${c.name}</div></div>`;
            if(hasChild && isExp) html += buildNav(c.id, level + 1);
        }); return html;
    }
    function renderNav() { $('category-list').innerHTML = buildNav(); }

    window.setViewMode = function(mode, doSave = true) {
        db.viewMode = mode; if(doSave) saveDB();
        const container = $('post-list-container'), btnList = $('btn-view-list'), btnGallery = $('btn-view-gallery');
        if(mode === 'gallery') { container.className = 'view-gallery'; btnGallery.classList.add('active'); btnList.classList.remove('active'); } 
        else { container.className = 'view-list'; btnList.classList.add('active'); btnGallery.classList.remove('active'); }
    }

    window.openCategory = function(id) {
        currentCatId = id; expandedCats.add(id); goPage('board');
        $('board-title').innerText = (db.categories.find(c=>c.id==id)||{}).name || 'Unknown';
        let posts = db.posts.filter(p => p.catId == id).sort((a,b) => b.isNotice - a.isNotice || b.id - a.id);
        if(!posts.length) { $('post-list-container').innerHTML = '<div style="color:var(--moon-dim); text-align:center; padding:40px;">데이터가 없습니다.</div>'; return; }
        $('post-list-container').innerHTML = posts.map(p => {
            let thumbHtml = p.imgUrl ? `<img src="${p.imgUrl}" class="post-thumb">` : `<div class="post-thumb"></div>`;
            return `<div class="post-card ${p.isNotice?'notice':''}" onclick="viewPost(${p.id})">${thumbHtml}<div class="post-info-wrap">${p.isNotice?'<div class="notice-badge">MAIN TRACK</div>':''}<div style="font-size:1.15rem; color:#fff;">${p.title}</div><div class="eng-font" style="font-size:0.85rem; color:var(--moon-dim); margin-top:8px;">${p.author?p.author+' | ':''}${p.date}</div></div></div>`;
        }).join('');
    }

    window.formatDoc = function(cmd, value=null) { document.execCommand(cmd, false, value); $('w-content').focus(); }
    window.insertLink = function() { const url = prompt("URL"); if(url) formatDoc('createLink', url); }
    window.insertToggle = function() { const title = prompt("제목", "더보기"); if(title) formatDoc('insertHTML', `<br><details class="rich-details"><summary>${title}</summary><div class="details-content">내용</div></details><br>`); }

    let currentEditingTable = null;
    window.openTableModal = function() {
        const sel = window.getSelection(); let node = sel.anchorNode;
        while(node && node.nodeName !== 'TABLE' && node.id !== 'w-content') { node = node.parentNode; }
        if(node && node.nodeName === 'TABLE') {
            currentEditingTable = node; $('t-rows-wrap').style.display = 'none'; $('t-cols-wrap').style.display = 'none';
            $('t-width').value = node.style.width.replace('%','') || '100'; openModal('tableModal');
        } else { currentEditingTable = null; $('t-rows-wrap').style.display = 'flex'; $('t-cols-wrap').style.display = 'flex'; openModal('tableModal'); }
    }
    window.applyTable = function() {
        const w = $('t-width').value + '%', bg = $('t-bg-transparent').checked ? 'transparent' : $('t-bg').value;
        if(currentEditingTable) { currentEditingTable.style.width = w; currentEditingTable.style.backgroundColor = bg; }
        else {
            let html = `<table class="rich-table" style="width:${w}; background-color:${bg};"><tbody>`;
            for(let i=0; i<$('t-rows').value; i++) { html += '<tr>'; for(let j=0; j<$('t-cols').value; j++) html += '<td>-</td>'; html += '</tr>'; }
            html += '</tbody></table><br>'; formatDoc('insertHTML', html);
        } closeModal('tableModal');
    }

    window.insertYouTube = function() {
        const url = prompt("YouTube URL"); const match = url.match(/([^"&?\/\s]{11})/);
        if(match) formatDoc('insertHTML', `<div class="youtube-embed-wrapper"><iframe src="https://www.youtube.com/embed/${match[1]}" frameborder="0" allowfullscreen></iframe></div><br>`);
    }

    function buildSelect(parentId = null, level = 0, selId = null) {
        let html = '';
        db.categories.filter(c => c.parentId == parentId).forEach(c => {
            html += `<option value="${c.id}" ${c.id==selId?'selected':''}>${'&nbsp;'.repeat(level*4)}${c.name}</option>`;
            html += buildSelect(c.id, level+1, selId);
        }); return html;
    }
    
    window.goGuestWrite = function() { goWrite(null, parseInt(db.guestbookCatId)); }
    window.goWrite = function(postId = null, guestCatId = null) { 
        goPage('write'); editingPostId = postId;
        if(postId) { const p = db.posts.find(x => x.id == postId); $('w-title').value = p.title; $('w-author').value = p.author || ''; $('w-img-url').value = p.imgUrl||''; $('w-content').innerHTML = p.content; $('w-category').innerHTML = buildSelect(null, 0, p.catId); } 
        else { $('w-title').value = ''; $('w-author').value = ''; $('w-img-url').value = ''; $('w-content').innerHTML = ''; $('w-category').innerHTML = buildSelect(null, 0, guestCatId || currentCatId); }
        $('w-category').disabled = !isAuthed && guestCatId;
    }

    window.savePost = function() { 
        const catId = parseInt($('w-category').value), title = $('w-title').value.trim(), author = $('w-author').value.trim();
        if(!title || (!isAuthed && !author)) return alert('입력 확인');
        const postData = { id: editingPostId || Date.now(), catId, title, author, imgUrl: $('w-img-url').value, content: $('w-content').innerHTML, date: new Date().toLocaleDateString(), isNotice: false };
        if(editingPostId) { const idx = db.posts.findIndex(p => p.id == editingPostId); db.posts[idx] = postData; } 
        else { db.posts.push(postData); }
        saveDB(); openCategory(catId);
    }

    window.viewPost = function(id) { 
        currentPostId = id; const p = db.posts.find(x => x.id == id); if(!p) return;
        const c = db.categories.find(x => x.id == p.catId); $('v-title').innerText = p.title; 
        $('v-info').innerHTML = `${c?c.name:''} | ${p.author ? '<b>'+p.author+'</b> | ' : ''}${p.date}`; 
        $('v-content').innerHTML = p.content; const img = $('v-image'); if(p.imgUrl) { img.src = p.imgUrl; img.style.display = 'block'; } else img.style.display = 'none'; 
        $('btn-notice').innerText = p.isNotice ? "☆ 메인 해제" : "★ 메인 트랙 지정"; goPage('view'); 
    }

    window.toggleNotice = function() { const p = db.posts.find(x=>x.id==currentPostId); p.isNotice = !p.isNotice; saveDB(); }
    window.deletePost = function() { if(confirm('삭제?')) { db.posts = db.posts.filter(p => p.id != currentPostId); saveDB(); goPage('board'); } }

    window.openSettingModal = function() { 
        $('s-new-pw').value = ''; $('s-home-banner-img').value = db.homeBannerImg; $('s-font-url').value = db.fontUrl;
        $('s-intro-main').value = db.introMain; $('s-site-name').value = db.siteName; $('s-home-title').value = db.homeTitle; $('s-home-desc').value = db.homeDesc; $('s-bgm-id').value = db.bgmId; 
        updateThemeMgmt(); updateCatMgmt(); openModal('settingModal'); 
    }
    function updateThemeMgmt() { $('s-theme-select').innerHTML = db.themes.map(t => `<option value="${t.id}" ${t.id == db.activeThemeId ? 'selected' : ''}>${t.name}</option>`).join(''); }
    window.addTheme = function() { const name = $('s-new-theme-name').value.trim(); if(name) { db.themes.push({ id: Date.now(), name, hex: $('s-new-theme-color').value }); saveDB(); } }
    window.deleteTheme = function() { if(db.themes.length > 1) { db.themes = db.themes.filter(t => t.id != $('s-theme-select').value); saveDB(); } }
    
    function updateCatMgmt() { 
        $('s-parent-cat').innerHTML = '<option value="">-- 최상위 --</option>' + buildSelect(null, 0); 
        $('s-guestbook-cat').innerHTML = '<option value="">-- 방명록 미사용 --</option>' + buildSelect(null, 0, db.guestbookCatId);
        $('cat-manage-list').innerHTML = buildManageList(null, 0); 
    }
    function buildManageList(parentId = null, level = 0) { 
        return db.categories.filter(c => c.parentId == parentId).map(c => `
            <div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px dashed #333;">
                <span>${' '.repeat(level)}${c.name}</span>
                <div><button onclick="editCatName(${c.id})">수정</button><button onclick="delCat(${c.id})">삭제</button></div>
            </div>` + buildManageList(c.id, level + 1)).join('');
    }
    window.addCategory = function() { 
        const name = $('s-new-cat').value.trim(), pid = $('s-parent-cat').value; 
        if(name) { db.categories.push({ id: Date.now(), name, parentId: pid ? parseInt(pid) : null }); saveDB(); $('s-new-cat').value = ''; } 
    }
    window.editCatName = function(id) { const c = db.categories.find(x=>x.id==id); const n = prompt("이름", c.name); if(n) { c.name = n; saveDB(); } }
    window.delCat = function(id) { if(confirm('삭제?')){ db.categories = db.categories.filter(x => x.id != id); saveDB(); } }
    
    window.saveSettings = function() { 
        if($('s-new-pw').value) db.masterPw = $('s-new-pw').value; 
        db.homeBannerImg = $('s-home-banner-img').value; db.fontUrl = $('s-font-url').value;
        db.activeThemeId = parseInt($('s-theme-select').value); db.bgmId = $('s-bgm-id').value; 
        db.guestbookCatId = $('s-guestbook-cat').value ? parseInt($('s-guestbook-cat').value) : null;
        db.introMain = $('s-intro-main').value; db.siteName = $('s-site-name').value; db.homeTitle = $('s-home-title').value; db.homeDesc = $('s-home-desc').value; 
        saveDB(); closeModal('settingModal');
    }

    window.onload = init;
</script>
</body>
</html>
